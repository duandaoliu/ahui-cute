<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋入门 - 交互式学习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: #1a1a2e;
  color: #e0d5c1;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  display: flex;
  gap: 24px;
  padding: 24px;
  max-width: 1100px;
  width: 100%;
  align-items: flex-start;
}

/* Board Area */
.board-area {
  flex-shrink: 0;
  position: relative;
}

.board-wrapper {
  background: #2a2218;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  border: 3px solid #4a3828;
}

canvas {
  display: block;
  border-radius: 4px;
  cursor: pointer;
}

.board-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding: 8px 4px;
}

.player-turn {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
}

.stone-indicator {
  width: 28px; height: 28px;
  border-radius: 50%;
  box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  transition: all 0.3s;
}
.stone-indicator.black { background: radial-gradient(circle at 35% 35%, #555, #111 60%, #000); }
.stone-indicator.white { background: radial-gradient(circle at 35% 35%, #fff, #ddd 40%, #aaa); }

.captures-display {
  font-size: 14px;
  color: #a09080;
}

/* Side Panel */
.side-panel {
  flex: 1;
  min-width: 300px;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-card {
  background: #252540;
  border-radius: 10px;
  padding: 20px;
  border: 1px solid #363650;
}

.panel-card h2 {
  font-size: 20px;
  margin-bottom: 14px;
  color: #f0e0c0;
  border-bottom: 1px solid #363650;
  padding-bottom: 10px;
}

/* Tutorial */
.tutorial-step {
  margin-bottom: 16px;
}

.tutorial-step h3 {
  font-size: 16px;
  color: #d4a574;
  margin-bottom: 8px;
}

.tutorial-step p {
  font-size: 14px;
  line-height: 1.7;
  color: #c0b8a8;
  margin-bottom: 6px;
}

.tutorial-nav {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* Buttons */
.btn {
  padding: 8px 18px;
  border: 1px solid #4a4a6a;
  border-radius: 6px;
  background: #2a2a45;
  color: #d0c8b8;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
.btn:hover { background: #3a3a58; border-color: #6a6a8a; }
.btn:active { transform: scale(0.97); }
.btn.primary { background: #5a4a30; border-color: #8a6a40; color: #f0e0c0; }
.btn.primary:hover { background: #6a5a38; }
.btn.danger { background: #4a2020; border-color: #6a3030; color: #e0a0a0; }
.btn.danger:hover { background: #5a2828; }
.btn.small { padding: 4px 10px; font-size: 12px; }

/* Board Size Selector */
.size-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.size-selector .btn {
  flex: 1;
  text-align: center;
  min-width: 50px;
}
.size-selector .btn.active {
  background: #4a3a20;
  border-color: #8a6a30;
  color: #f0d8a0;
}

/* Controls */
.controls-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

/* Coordinate labels */
.coord-hint {
  font-size: 12px;
  color: #6a6050;
  text-align: center;
  margin-top: 4px;
}

/* Highlight box for tutorial guidance */
.highlight-box {
  background: #3a3020;
  border: 1px dashed #8a6a40;
  border-radius: 6px;
  padding: 12px;
  margin: 10px 0;
  font-size: 14px;
  color: #f0d8a0;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #3a3020;
  color: #f0d8a0;
  padding: 10px 24px;
  border-radius: 8px;
  border: 1px solid #8a6a30;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 800px) {
  .container {
    flex-direction: column;
    align-items: center;
  }
  .side-panel { max-width: 500px; width: 100%; }
}
</style>
</head>
<body>

<div class="container">
  <!-- 围棋棋盘 -->
  <div class="board-area">
    <div class="board-wrapper">
      <canvas id="boardCanvas"></canvas>
    </div>
    <div class="board-info">
      <div class="player-turn">
        当前执子：
        <div class="stone-indicator black" id="turnIndicator"></div>
        <span id="turnText">黑棋</span>
      </div>
      <div class="captures-display">
        提子：黑 <b id="capBlack">0</b> 子 | 白 <b id="capWhite">0</b> 子
      </div>
    </div>
  </div>

  <!-- 侧边栏 -->
  <div class="side-panel">
    <!-- 棋盘大小 -->
    <div class="panel-card">
      <h2>棋盘大小</h2>
      <div class="size-selector" id="sizeSelector">
        <button class="btn active" data-size="9">9×9 入门</button>
        <button class="btn" data-size="13">13×13 进阶</button>
        <button class="btn" data-size="19">19×19 标准</button>
      </div>
      <div class="coord-hint">* 推荐新手从 9×9 开始</div>
    </div>

    <!-- 教程面板 -->
    <div class="panel-card" id="tutorialPanel">
      <h2>🎓 围棋入门教程</h2>
      <div class="tutorial-step" id="tutorialContent">
        <h3>第1步：认识棋盘</h3>
        <p>围棋棋盘由纵横各19条线组成，共<b>361个交叉点</b>。</p>
        <p>棋子下在<b>交叉点</b>上，不是方格内。</p>
        <p>棋盘上的小圆点叫<b>"星位"</b>，是重要的参考点。</p>
      </div>
      <div class="tutorial-nav">
        <button class="btn" id="btnPrev">上一步</button>
        <button class="btn primary" id="btnNext">下一步 →</button>
      </div>
      <div style="margin-top:8px; font-size:12px; color:#6a6050;">
        进度：<span id="stepIndicator">1/8</span>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="panel-card">
      <h2>操作</h2>
      <div class="controls-row">
        <button class="btn" id="btnPass">停一手 (Pass)</button>
        <button class="btn" id="btnUndo">悔棋</button>
        <button class="btn danger" id="btnReset">重置棋盘</button>
      </div>
      <div class="controls-row" style="margin-top:6px;">
        <button class="btn small" id="btnToggleLabels">显示/隐藏坐标</button>
        <button class="btn small" id="btnToggleLiberty">显示/隐藏气</button>
        <button class="btn small" id="btnToggleMute">🔊 音效</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 围棋引擎 ============
class GoGame {
  constructor(size = 9) {
    this.size = size;
    this.reset();
  }

  reset() {
    this.board = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
    this.currentPlayer = 1; // 1=黑 2=白
    this.captures = { 1: 0, 2: 0 };
    this.moveHistory = [];
    this.passes = 0;
    this.lastMove = null;
  }

  cloneBoard() {
    return this.board.map(row => [...row]);
  }

  inBounds(x, y) {
    return x >= 0 && x < this.size && y >= 0 && y < this.size;
  }

  getNeighbors(x, y) {
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    return dirs.map(([dx,dy]) => [x+dx, y+dy]).filter(([nx,ny]) => this.inBounds(nx, ny));
  }

  // BFS 找到同色连通块
  getGroup(x, y) {
    const color = this.board[y][x];
    if (color === 0) return [];
    const group = [];
    const visited = Array(this.size).fill(null).map(() => Array(this.size).fill(false));
    const stack = [[x, y]];
    visited[y][x] = true;
    while (stack.length) {
      const [cx, cy] = stack.pop();
      group.push([cx, cy]);
      for (const [nx, ny] of this.getNeighbors(cx, cy)) {
        if (!visited[ny][nx] && this.board[ny][nx] === color) {
          visited[ny][nx] = true;
          stack.push([nx, ny]);
        }
      }
    }
    return group;
  }

  // 获取一个棋块的所有气
  getLiberties(x, y) {
    const group = this.getGroup(x, y);
    if (!group.length) return [];
    const libSet = new Set();
    for (const [gx, gy] of group) {
      for (const [nx, ny] of this.getNeighbors(gx, gy)) {
        if (this.board[ny][nx] === 0) libSet.add(`${nx},${ny}`);
      }
    }
    return [...libSet].map(s => s.split(',').map(Number));
  }

  // 获取所有棋块及其气（用于显示）
  getAllGroups() {
    const visited = Array(this.size).fill(null).map(() => Array(this.size).fill(false));
    const groups = [];
    for (let y = 0; y < this.size; y++) {
      for (let x = 0; x < this.size; x++) {
        if (this.board[y][x] !== 0 && !visited[y][x]) {
          const group = this.getGroup(x, y);
          const libs = this.getLiberties(x, y);
          for (const [gx, gy] of group) visited[gy][gx] = true;
          groups.push({ color: this.board[y][x], stones: group, liberties: libs });
        }
      }
    }
    return groups;
  }

  placeStone(x, y) {
    if (!this.inBounds(x, y)) return { valid: false, reason: '坐标无效' };
    if (this.board[y][x] !== 0) return { valid: false, reason: '此处已有棋子' };

    const prevBoard = this.cloneBoard();
    const prevCaptures = { ...this.captures };

    // 先放棋子
    this.board[y][x] = this.currentPlayer;
    const opponent = this.currentPlayer === 1 ? 2 : 1;
    let totalCaptured = [];

    // 检查提掉对方
    for (const [nx, ny] of this.getNeighbors(x, y)) {
      if (this.board[ny][nx] === opponent) {
        const libs = this.getLiberties(nx, ny);
        if (libs.length === 0) {
          const group = this.getGroup(nx, ny);
          totalCaptured.push(...group);
          for (const [gx, gy] of group) this.board[gy][gx] = 0;
        }
      }
    }

    // 检查自杀
    const ownLibs = this.getLiberties(x, y);
    if (ownLibs.length === 0 && totalCaptured.length === 0) {
      this.board = prevBoard;
      return { valid: false, reason: '禁入点（没有气，又不能提子）' };
    }

    // 检查全局同形（劫争简化判断）
    if (totalCaptured.length === 1) {
      let isKo = true;
      // 简单Ko判断: 如果只提一子，且落子后只剩一口气
      // （完整判断需要对比所有历史board，这里做简化版）
      // 实际上检查是否和上一步形成重复
      if (ownLibs.length === 1 && this.moveHistory.length >= 1) {
        isKo = false; // 简化处理，完整Ko规则需要更多状态
      }
    }

    this.captures[this.currentPlayer] += totalCaptured.length;
    this.moveHistory.push({
      x, y,
      player: this.currentPlayer,
      captured: totalCaptured,
      prevBoard,
      prevCaptures,
    });
    this.lastMove = [x, y];
    this.passes = 0;

    const result = {
      valid: true,
      captured: totalCaptured,
    };

    this.currentPlayer = opponent;
    return result;
  }

  pass() {
    this.passes++;
    this.moveHistory.push({ pass: true, player: this.currentPlayer });
    this.lastMove = null;
    this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
    if (this.passes >= 2) {
      return { gameOver: true, winner: this.determineWinner() };
    }
    return { gameOver: false };
  }

  undo() {
    if (!this.moveHistory.length) return false;
    const last = this.moveHistory.pop();
    if (last.pass) {
      this.passes = Math.max(0, this.passes - 1);
      this.currentPlayer = last.player;
      return true;
    }
    this.board[last.y][last.x] = 0;
    for (const [cx, cy] of last.captured) {
      this.board[cy][cx] = last.player === 1 ? 2 : 1;
    }
    this.board = last.prevBoard;
    this.captures = last.prevCaptures;
    this.currentPlayer = last.player;
    this.lastMove = this.moveHistory.length
      ? (this.moveHistory[this.moveHistory.length - 1].pass ? null
         : [this.moveHistory[this.moveHistory.length - 1].x, this.moveHistory[this.moveHistory.length - 1].y])
      : null;
    this.passes = 0;
    return true;
  }

  determineWinner() {
    // 简化：按领地+提子计算
    // 真正的计目需要更多逻辑，这里给个大致结果
    return null; // 先返回null表示需要手动判断
  }

  getStarPoints() {
    if (this.size === 9) {
      return [[2,2],[2,6],[4,4],[6,2],[6,6]];
    } else if (this.size === 13) {
      return [[3,3],[3,9],[6,6],[9,3],[9,9]];
    } else if (this.size === 19) {
      return [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
    }
    return [];
  }
}

// ============ 棋盘渲染 ============
class GoRenderer {
  constructor(canvas, game) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.game = game;
    this.padding = 40;
    this.showLabels = true;
    this.showLiberties = true;
    this.hoverPos = null;
    this.highlightedIntersections = []; // [x,y] 数组
    this.highlightColor = '#f0a030';
  }

  calcLayout() {
    const size = this.game.size;
    const available = Math.min(this.canvas.width, this.canvas.height) - this.padding * 2;
    const spacing = available / (size - 1);
    const boardWidth = spacing * (size - 1);
    return { spacing, boardWidth, ox: this.padding, oy: this.padding };
  }

  render() {
    const { spacing, boardWidth, ox, oy } = this.calcLayout();
    const ctx = this.ctx;
    const size = this.game.size;
    const w = ox * 2 + boardWidth;
    const h = oy * 2 + boardWidth;
    this.canvas.width = w;
    this.canvas.height = h;

    // 棋盘背景（木纹效果）
    const bgGrad = ctx.createLinearGradient(0, 0, w, h);
    bgGrad.addColorStop(0, '#d4a456');
    bgGrad.addColorStop(0.3, '#c8983e');
    bgGrad.addColorStop(0.6, '#d4a456');
    bgGrad.addColorStop(1, '#b8883a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, w, h);

    // 木纹纹理
    ctx.strokeStyle = 'rgba(139,90,43,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < h; i += 6) {
      ctx.beginPath();
      ctx.moveTo(0, i + Math.sin(i * 0.05) * 2);
      ctx.lineTo(w, i + Math.sin(i * 0.05 + 1) * 2);
      ctx.stroke();
    }

    // 网格线
    ctx.strokeStyle = '#3a2810';
    ctx.lineWidth = 1;
    for (let i = 0; i < size; i++) {
      const pos = ox + i * spacing;
      ctx.beginPath();
      ctx.moveTo(pos, oy);
      ctx.lineTo(pos, oy + boardWidth);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ox, pos);
      ctx.lineTo(ox + boardWidth, pos);
      ctx.stroke();
    }

    // 星位
    const starPoints = this.game.getStarPoints();
    for (const [sx, sy] of starPoints) {
      ctx.beginPath();
      ctx.arc(ox + sx * spacing, oy + sy * spacing, spacing * 0.1, 0, Math.PI * 2);
      ctx.fillStyle = '#3a2810';
      ctx.fill();
    }

    // 坐标标签
    if (this.showLabels) {
      ctx.fillStyle = '#5a4020';
      ctx.font = `${Math.max(10, spacing * 0.25)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < size; i++) {
        // 列标签（字母）
        const colLabel = String.fromCharCode(65 + (i < 8 ? i : i + 1)); // 跳过 I
        ctx.fillText(colLabel, ox + i * spacing, oy - 18);
        ctx.fillText(colLabel, ox + i * spacing, oy + boardWidth + 18);
        // 行标签（数字）
        ctx.fillText(String(size - i), ox - 20, oy + i * spacing);
        ctx.fillText(String(size - i), ox + boardWidth + 20, oy + i * spacing);
      }
    }

    // 高亮交叉点
    for (const [hx, hy] of this.highlightedIntersections) {
      const cx = ox + hx * spacing;
      const cy = oy + hy * spacing;
      ctx.beginPath();
      ctx.arc(cx, cy, spacing * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240,160,48,0.35)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(240,160,48,0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Hover效果
    if (this.hoverPos && this.game.board[this.hoverPos[1]][this.hoverPos[0]] === 0) {
      const [hx, hy] = this.hoverPos;
      const cx = ox + hx * spacing;
      const cy = oy + hy * spacing;
      ctx.beginPath();
      ctx.arc(cx, cy, spacing * 0.43, 0, Math.PI * 2);
      ctx.fillStyle = this.game.currentPlayer === 1
        ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';
      ctx.fill();
    }

    // 棋子
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (this.game.board[y][x] !== 0) {
          this.drawStone(ox + x * spacing, oy + y * spacing, spacing * 0.44,
                         this.game.board[y][x], [x, y]);
        }
      }
    }

    // 最后一手标记
    if (this.game.lastMove) {
      const [lx, ly] = this.game.lastMove;
      const cx = ox + lx * spacing;
      const cy = oy + ly * spacing;
      const markColor = this.game.board[ly][lx] === 1 ? '#f0a030' : '#c06020';
      ctx.beginPath();
      ctx.arc(cx, cy, spacing * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = markColor;
      ctx.fill();
    }

    // 显示气（数字）
    if (this.showLiberties) {
      const groups = this.game.getAllGroups();
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.max(9, spacing * 0.22)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const g of groups) {
        if (g.liberties.length <= 4 && g.liberties.length > 0) {
          // 在棋块中心显示气数
          const cx = g.stones.reduce((s, [x]) => s + x, 0) / g.stones.length;
          const cy = g.stones.reduce((s, [,y]) => s + y, 0) / g.stones.length;
          const scx = ox + cx * spacing;
          const scy = oy + cy * spacing;
          ctx.fillStyle = g.color === 1 ? '#e0d0a0' : '#3a2810';
          ctx.fillText(g.liberties.length, scx, scy);
        }
      }
    }
  }

  drawStone(cx, cy, radius, color, pos) {
    const ctx = this.ctx;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.closePath();

    if (color === 1) {
      // 黑子
      const grad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, radius*0.1, cx, cy, radius);
      grad.addColorStop(0, '#555');
      grad.addColorStop(0.5, '#222');
      grad.addColorStop(1, '#000');
      ctx.fillStyle = grad;
    } else {
      // 白子
      const grad = ctx.createRadialGradient(cx - radius*0.3, cy - radius*0.3, radius*0.1, cx, cy, radius);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.6, '#e8e8e0');
      grad.addColorStop(1, '#c0c0b0');
      ctx.fillStyle = grad;
    }

    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }

  getIntersection(mouseX, mouseY) {
    const { spacing, ox, oy } = this.calcLayout();
    const x = Math.round((mouseX - ox) / spacing);
    const y = Math.round((mouseY - oy) / spacing);
    if (this.game.inBounds(x, y)) {
      const cx = ox + x * spacing;
      const cy = oy + y * spacing;
      const dist = Math.sqrt((mouseX - cx) ** 2 + (mouseY - cy) ** 2);
      if (dist < spacing * 0.45) return [x, y];
    }
    return null;
  }
}

// ============ 教程管理器 ============
class TutorialManager {
  constructor() {
    this.currentStep = 0;
    this.steps = [
      {
        title: '第1步：认识围棋棋盘',
        html: `
          <p>围棋棋盘由纵横各<b>19条线</b>组成，共<b>361个交叉点</b>。</p>
          <p>棋子下在<b>交叉点</b>上，不是方格内！</p>
          <p>棋盘上的小圆点叫<b>"星位"</b>（hoshi），是重要的参考位置。</p>
          <p>初学者建议从 <b>9×9</b> 小棋盘开始，更容易上手。</p>

          <p><b>1目</b> = 1个被己方棋子围住的空交叉点</p>
          <p>提掉的对方棋子也算1目，最后加在一起比大小。</p>
          <p>黑先走有优势，所以贴给白方 <b>6.5目</b>（叫"贴目"）。</p>
        `,
        setupBoard: null,
        action: null,
      },
      {
        title: '第8步：自由对弈',
        html: `
          <p>恭喜！你已经掌握了围棋的基本规则。</p>
          <p>现在可以和电脑/朋友轮流落子，开始你的第一盘棋吧！</p>
          <p>建议：</p>
          <ul style="color:#c0b8a8;font-size:14px;line-height:1.8;padding-left:20px;">
            <li>先在9×9棋盘上练习</li>
            <li>重点关注吃子和做眼</li>
            <li>多下多练，棋感自然来</li>
          </ul>
        `,
        setupBoard: null,
        action: 'free_play',
      },
    ];
  }

  getStep() {
    return this.steps[this.currentStep];
  }

  next() {
    if (this.currentStep < this.steps.length - 1) {
      this.currentStep++;
      return true;
    }
    return false;
  }

  prev() {
    if (this.currentStep > 0) {
      this.currentStep--;
      return true;
    }
    return false;
  }

  isFreePlay() {
    return this.currentStep === this.steps.length - 1;
  }
}

// ============ 声音引擎 ============
class SoundManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
    // 延迟初始化 AudioContext（需要用户交互后）
    this._initOnInteraction = () => {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (this.ctx.state === 'suspended') this.ctx.resume();
    };
    // 全局绑定一次
    document.addEventListener('click', this._initOnInteraction, { once: true });
  }

  _ensure() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  }

  // 落子声 — 模拟棋子敲击木棋盘
  stone() {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;

    // 木头共振：低频短促
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(180, now + 0.06);
    gain.gain.setValueAtTime(0.35, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.08);

    // 清脆高频敲击
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(2400, now);
    osc2.frequency.exponentialRampToValueAtTime(600, now + 0.03);
    gain2.gain.setValueAtTime(0.25, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(now);
    osc2.stop(now + 0.04);
  }

  // 提子声 — 多颗棋子被拿走
  capture(count = 1) {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;

    for (let i = 0; i < Math.min(count, 5); i++) {
      const t = now + i * 0.04;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(600 + i * 150, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.05);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.06);
    }
  }

  // 错误/无效操作
  error() {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.setValueAtTime(110, now + 0.1);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  }

  // 停一手
  pass() {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.setValueAtTime(330, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.25);
  }

  // 教程切换
  chime() {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + i * 0.08 + 0.2);
    });
  }

  // 重置
  reset() {
    if (this.muted) return;
    const ctx = this._ensure();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.35);
  }
}

// ============ 主应用 ============
class GoApp {
  constructor() {
    this.game = new GoGame(9);
    this.tutorial = new TutorialManager();
    this.renderer = null;
    this.boardSize = 9;
    this.sound = new SoundManager();

    this.canvas = document.getElementById('boardCanvas');
    this.initCanvas();
    this.renderer = new GoRenderer(this.canvas, this.game);

    this.bindEvents();
    this.applyTutorialSetup();
    this.updateUI();
    this.renderer.render();
  }

  initCanvas() {
    const size = Math.min(520, window.innerWidth - 400);
    this.canvas.width = size;
    this.canvas.height = size;
  }

  bindEvents() {
    // 棋盘点击
    this.canvas.addEventListener('click', (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const pos = this.renderer.getIntersection(mx, my);
      if (pos) this.handleClick(pos[0], pos[1]);
    });

    // 鼠标移动（Hover效果）
    this.canvas.addEventListener('mousemove', (e) => {
      const rect = this.canvas.getBoundingClientRect();
      const scaleX = this.canvas.width / rect.width;
      const scaleY = this.canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const pos = this.renderer.getIntersection(mx, my);
      this.renderer.hoverPos = pos;
      this.renderer.render();
    });

    this.canvas.addEventListener('mouseleave', () => {
      this.renderer.hoverPos = null;
      this.renderer.render();
    });

    // 棋盘大小切换
    document.querySelectorAll('#sizeSelector .btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const newSize = parseInt(btn.dataset.size);
        if (newSize !== this.boardSize) {
          this.boardSize = newSize;
          this.game = new GoGame(newSize);
          this.renderer.game = this.game;
          document.querySelectorAll('#sizeSelector .btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          this.applyTutorialSetup();
          this.updateUI();
          this.renderer.render();
        }
      });
    });

    // 教程导航
    document.getElementById('btnNext').addEventListener('click', () => {
      if (this.tutorial.next()) {
        this.sound.chime();
        this.game = new GoGame(this.boardSize);
        this.renderer.game = this.game;
        this.applyTutorialSetup();
        this.updateUI();
        this.renderer.render();
        this.updateTutorialContent();
      }
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (this.tutorial.prev()) {
        this.sound.pass();
        this.game = new GoGame(this.boardSize);
        this.renderer.game = this.game;
        this.applyTutorialSetup();
        this.updateUI();
        this.renderer.render();
        this.updateTutorialContent();
      }
    });

    // 操作按钮
    document.getElementById('btnPass').addEventListener('click', () => {
      const result = this.game.pass();
      if (result.gameOver) {
        this.sound.chime();
        this.showToast('双方连续停手，棋局结束！');
      } else {
        this.sound.pass();
        this.showToast(`${this.game.currentPlayer === 1 ? '黑棋' : '白棋'}停了一手`);
      }
      this.updateUI();
      this.renderer.render();
    });

    document.getElementById('btnUndo').addEventListener('click', () => {
      if (this.game.undo()) {
        this.sound.pass();
        this.showToast('已悔棋');
      } else {
        this.sound.error();
        this.showToast('无法悔棋');
      }
      this.updateUI();
      this.renderer.render();
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      this.game = new GoGame(this.boardSize);
      this.renderer.game = this.game;
      this.applyTutorialSetup();
      this.updateUI();
      this.renderer.render();
      this.sound.reset();
      this.showToast('棋盘已重置');
    });

    document.getElementById('btnToggleLabels').addEventListener('click', () => {
      this.renderer.showLabels = !this.renderer.showLabels;
      this.renderer.render();
    });

    document.getElementById('btnToggleLiberty').addEventListener('click', () => {
      this.renderer.showLiberties = !this.renderer.showLiberties;
      this.renderer.render();
    });

    document.getElementById('btnToggleMute').addEventListener('click', () => {
      this.sound.muted = !this.sound.muted;
      const btn = document.getElementById('btnToggleMute');
      btn.textContent = this.sound.muted ? '🔇 静音' : '🔊 音效';
      if (!this.sound.muted) this.sound.chime();
    });

    // 窗口大小调整
    window.addEventListener('resize', () => {
      this.initCanvas();
      this.renderer.render();
    });
  }

  handleClick(x, y) {
    const step = this.tutorial.getStep();

    // 教程第4步：捕获演示
    if (this.tutorial.currentStep === 3 && step.target) {
      const [tx, ty] = step.target;
      if (x === tx && y === ty) {
        // 正确！执行捕获
        const result = this.game.placeStone(x, y);
        if (result.valid) {
          this.sound.stone();
          setTimeout(() => this.sound.capture(result.captured.length), 80);
          this.showToast('太棒了！白子被提掉了！这就是"吃子"。');
          this.renderer.highlightedIntersections = [];
          this.updateUI();
          this.renderer.render();
          // 自动进入下一步
          setTimeout(() => {
            this.sound.chime();
            if (this.tutorial.next()) {
              this.game = new GoGame(this.boardSize);
              this.renderer.game = this.game;
              this.applyTutorialSetup();
              this.updateUI();
              this.renderer.render();
              this.updateTutorialContent();
            }
          }, 2000);
        }
        return;
      } else {
        this.sound.error();
        this.showToast('请点击标亮的位置来提掉白子');
        return;
      }
    }

    // 自由落子（大部分步骤）
    const result = this.game.placeStone(x, y);
    if (!result.valid) {
      this.sound.error();
      this.showToast(result.reason || '此处不能落子');
      return;
    }

    this.sound.stone();
    if (result.captured.length > 0) {
      setTimeout(() => this.sound.capture(result.captured.length), 60);
      this.showToast(`提掉 ${result.captured.length} 颗${this.game.currentPlayer === 1 ? '白子' : '黑子'}！`);
    }

    this.renderer.highlightedIntersections = [];
    this.updateUI();
    this.renderer.render();
  }

  applyTutorialSetup() {
    const step = this.tutorial.getStep();
    this.renderer.highlightedIntersections = [];

    if (step.setupBoard) {
      step.setupBoard(this.game);
    }
    if (step.target) {
      this.renderer.highlightedIntersections = [step.target];
    }

    // 教程第0步：高亮几个交叉点展示
    if (this.tutorial.currentStep === 0) {
      this.renderer.highlightedIntersections = [[2,2],[2,6],[4,4],[6,2],[6,6]];
    }
  }

  updateTutorialContent() {
    const step = this.tutorial.getStep();
    document.getElementById('tutorialContent').innerHTML = `
      <h3>${step.title}</h3>
      ${step.html}
    `;
    document.getElementById('stepIndicator').textContent =
      `${this.tutorial.currentStep + 1}/${this.tutorial.steps.length}`;

    // 更新按钮状态
    document.getElementById('btnPrev').style.display = this.tutorial.currentStep === 0 ? 'none' : '';
    const nextBtn = document.getElementById('btnNext');
    if (this.tutorial.isFreePlay()) {
      nextBtn.textContent = '🎉 已完成教程';
      nextBtn.style.opacity = '0.6';
      nextBtn.style.pointerEvents = 'none';
    } else {
      nextBtn.textContent = '下一步 →';
      nextBtn.style.opacity = '1';
      nextBtn.style.pointerEvents = 'auto';
    }
  }

  updateUI() {
    document.getElementById('capBlack').textContent = this.game.captures[1];
    document.getElementById('capWhite').textContent = this.game.captures[2];

    const indicator = document.getElementById('turnIndicator');
    indicator.className = 'stone-indicator ' + (this.game.currentPlayer === 1 ? 'black' : 'white');
    document.getElementById('turnText').textContent = this.game.currentPlayer === 1 ? '黑棋' : '白棋';

    this.updateTutorialContent();
  }

  showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }
}

// ============ 启动 ============
window.addEventListener('DOMContentLoaded', () => {
  new GoApp();
});
</script>
