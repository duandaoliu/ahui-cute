<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交互式元素周期表</title>
<style>
  :root {
    --bg: #0a0a14;
    --panel-bg: #12122a;
    --text: #e0e0f0;
    --text-secondary: #a0a0c0;
    --border: #2a2a4a;
    --accent: #6c5ce7;
    --glow: rgba(108, 92, 231, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0, 206, 209, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
  }

  /* === HEADER === */
  .header {
    text-align: center;
    padding: 24px 20px 10px;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .header .subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  /* === MAIN LAYOUT === */
  .main-container {
    display: flex;
    gap: 32px;
    padding: 10px 24px 20px;
    max-width: 1600px;
    margin: 0 auto;
    align-items: flex-start;
    justify-content: flex-end;
  }

  /* === PERIODIC TABLE === */
  .table-wrapper {
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    padding-bottom: 10px;
  }
  .periodic-table {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    grid-template-rows: auto;
    gap: 3px;
    min-width: 1100px;
  }

  /* Space rows for lanthanide/actinide */
  .gap-row {
    grid-column: 1 / -1;
    height: 6px;
  }

  .element {
    position: relative;
    aspect-ratio: 1 / 1.1;
    min-width: 50px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1.5px solid transparent;
    background: rgba(20, 20, 50, 0.7);
    backdrop-filter: blur(4px);
    user-select: none;
    overflow: hidden;
  }
  .element::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: -1;
  }
  .element:hover {
    transform: translateY(-3px) scale(1.08);
    z-index: 10;
    box-shadow: 0 8px 32px var(--glow);
    border-color: rgba(255,255,255,0.3);
  }
  .element:hover::before {
    opacity: 1;
  }
  .element .atomic-num {
    position: absolute;
    top: 3px;
    left: 6px;
    font-size: 0.55rem;
    color: var(--text-secondary);
    font-weight: 500;
    line-height: 1;
  }
  .element .symbol {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-top: 2px;
  }
  .element .name {
    font-size: 0.48rem;
    color: var(--text-secondary);
    line-height: 1;
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90%;
  }
  .element .mass {
    font-size: 0.45rem;
    color: #8888aa;
    line-height: 1;
    margin-top: 1px;
  }

  /* Category colors */
  .cat-alkali-metal       { background: rgba(255, 107, 107, 0.18); border-color: rgba(255, 107, 107, 0.35); }
  .cat-alkali-metal::before { background: radial-gradient(circle at center, rgba(255,107,107,0.3) 0%, transparent 70%); }
  .cat-alkaline-earth     { background: rgba(255, 165, 96, 0.18); border-color: rgba(255, 165, 96, 0.35); }
  .cat-alkaline-earth::before { background: radial-gradient(circle at center, rgba(255,165,96,0.3) 0%, transparent 70%); }
  .cat-transition-metal   { background: rgba(250, 204, 100, 0.16); border-color: rgba(250, 204, 100, 0.3); }
  .cat-transition-metal::before { background: radial-gradient(circle at center, rgba(250,204,100,0.25) 0%, transparent 70%); }
  .cat-post-transition    { background: rgba(100, 200, 180, 0.16); border-color: rgba(100, 200, 180, 0.3); }
  .cat-post-transition::before { background: radial-gradient(circle at center, rgba(100,200,180,0.25) 0%, transparent 70%); }
  .cat-metalloid          { background: rgba(110, 200, 160, 0.16); border-color: rgba(110, 200, 160, 0.3); }
  .cat-metalloid::before { background: radial-gradient(circle at center, rgba(110,200,160,0.25) 0%, transparent 70%); }
  .cat-nonmetal           { background: rgba(80, 200, 120, 0.18); border-color: rgba(80, 200, 120, 0.35); }
  .cat-nonmetal::before { background: radial-gradient(circle at center, rgba(80,200,120,0.3) 0%, transparent 70%); }
  .cat-halogen            { background: rgba(100, 180, 255, 0.18); border-color: rgba(100, 180, 255, 0.35); }
  .cat-halogen::before { background: radial-gradient(circle at center, rgba(100,180,255,0.3) 0%, transparent 70%); }
  .cat-noble-gas          { background: rgba(180, 130, 255, 0.18); border-color: rgba(180, 130, 255, 0.35); }
  .cat-noble-gas::before { background: radial-gradient(circle at center, rgba(180,130,255,0.3) 0%, transparent 70%); }
  .cat-lanthanide         { background: rgba(130, 200, 240, 0.16); border-color: rgba(130, 200, 240, 0.3); }
  .cat-lanthanide::before { background: radial-gradient(circle at center, rgba(130,200,240,0.25) 0%, transparent 70%); }
  .cat-actinide           { background: rgba(240, 140, 180, 0.16); border-color: rgba(240, 140, 180, 0.3); }
  .cat-actinide::before { background: radial-gradient(circle at center, rgba(240,140,180,0.25) 0%, transparent 70%); }

  .element:hover .symbol { text-shadow: 0 0 12px currentColor; }

  /* Empty cell placeholders */
  .empty-cell {
    background: transparent;
    border: none;
    pointer-events: none;
  }

  /* Series labels */
  .series-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 0.55rem;
    color: #8888aa;
    padding-right: 8px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* === DETAIL PANEL === */
  .detail-panel {
    width: 330px;
    min-width: 330px;
    flex-shrink: 0;
    background: var(--panel-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px;
    position: sticky;
    top: 16px;
    right: 0;
    backdrop-filter: blur(10px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    transition: all 0.3s;
  }
  .detail-panel.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 500px;
  }
  .detail-panel .panel-content {
    animation: fadeSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Selected element highlight */
  .element.selected {
    border-color: #ffffff !important;
    box-shadow: 0 0 20px rgba(255,255,255,0.25), 0 4px 16px var(--glow) !important;
    transform: translateY(-2px) scale(1.04);
    z-index: 5;
  }
  .panel-placeholder {
    text-align: center;
    color: var(--text-secondary);
  }
  .panel-placeholder .icon {
    font-size: 4rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .panel-placeholder p {
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .panel-symbol-badge {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
    font-weight: 800;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .panel-title h2 {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .panel-title .ename {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .panel-title .cat-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  /* Bohr Model Canvas */
  .bohr-container {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 300px;
    margin: 0 auto 20px;
    position: relative;
  }
  .bohr-container canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-item {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .info-item.full-width { grid-column: 1 / -1; }
  .info-item .label {
    font-size: 0.58rem;
    color: #8888aa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }
  .info-item .value {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e0e0f0;
    word-break: break-all;
  }
  .info-item .value.small { font-size: 0.74rem; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    justify-content: center;
    padding: 6px 16px 16px;
    max-width: 1500px;
    margin: 0 auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    color: #b0b0c8;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

  /* Responsive */
  @media (max-width: 1300px) {
    .detail-panel {
      width: 280px;
      min-width: 280px;
      padding: 16px;
    }
    .panel-symbol-badge { width: 50px; height: 50px; font-size: 1.4rem; }
    .panel-title h2 { font-size: 1.1rem; }
  }
  @media (max-width: 1100px) {
    .main-container {
      flex-direction: column;
      align-items: center;
    }
    .detail-panel {
      width: 100%;
      min-width: 0;
      max-width: 600px;
      position: static;
      padding: 20px;
    }
    .panel-symbol-badge { width: 60px; height: 60px; font-size: 1.7rem; }
    .panel-title h2 { font-size: 1.25rem; }
  }
  @media (max-width: 768px) {
    .header h1 { font-size: 1.4rem; }
    .element { min-width: 32px; border-radius: 4px; gap: 0; }
    .element .symbol { font-size: 0.75rem; }
    .element .name { font-size: 0.38rem; }
    .element .mass { font-size: 0.35rem; }
    .element .atomic-num { font-size: 0.42rem; top: 2px; left: 3px; }
    .periodic-table { gap: 1.5px; min-width: 700px; }
    .detail-panel { padding: 16px; border-radius: 12px; }
    .bohr-container { max-height: 220px; }
  }
</style>
</head>

// Map element data by symbol for quick lookup
// Auto-calculate column for lanthanide (row 8) and actinide (row 10) series
const elemMap = {};
elements.forEach(e => {
  let [z, sym, name, cat, grp, per, col, row, mass, ec, shells, melt, boil, dens, year] = e;
  if (col === -1 && row === 8)  col = z - 58 + 4;  // Lanthanides: Ce(58)→col4 ... Lu(71)→col17
  if (col === -1 && row === 10) col = z - 90 + 4;  // Actinides:  Th(90)→col4 ... Lr(103)→col17
  elemMap[sym] = { z, sym, name, cat, grp, per, col, row, mass, ec, shells, melt, boil, dens, year };
});

// ==================== BUILD TABLE ====================
const tableEl = document.getElementById('periodicTable');
const legendEl = document.getElementById('legend');

// Build legend
Object.entries(catConfig).forEach(([key, cfg]) => {
  const item = document.createElement('span');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${cfg.color}"></span>${cfg.label}`;
  legendEl.appendChild(item);
});

// Build grid
// We have rows 1-7 for main table, plus rows 8 (lanthanide) and 10 (actinide)
// Columns 1-18

// Helper: create element cell
function createElementCell(el) {
  const cfg = catConfig[el.cat] || catConfig['nonmetal'];
  const div = document.createElement('div');
  div.className = `element ${cfg.cssClass}`;
  div.style.gridColumn = el.col;
  div.style.gridRow = el.row;
  div.dataset.symbol = el.sym;
  div.innerHTML = `
    <span class="atomic-num">${el.z}</span>
    <span class="symbol">${el.sym}</span>
    <span class="name">${el.name}</span>
    <span class="mass">${el.mass.toFixed(1)}</span>
  `;
  div.addEventListener('mouseenter', () => showDetail(el));
  div.addEventListener('click', () => showDetail(el));
  return div;
}

// Insert all element cells
elements.forEach(e => {
  const [z, sym, name, cat, grp, per, col, row] = e;
  const el = elemMap[sym];
  tableEl.appendChild(createElementCell(el));
});

// Add series labels for lanthanide and actinide rows
function addSeriesLabel(text, row, col) {
  const label = document.createElement('div');
  label.className = 'series-label';
  label.style.gridColumn = col;
  label.style.gridRow = row;
  label.textContent = text;
  tableEl.appendChild(label);
}
addSeriesLabel('镧系', 8, '1 / 2');
addSeriesLabel('锕系', 10, '1 / 2');

let currentElement = null;
let animationId = null;

function showDetail(el) {
  if (currentElement === el.sym) return;

  // Remove previous selection
  if (currentElement) {
    const prev = document.querySelector(`.element[data-symbol="${currentElement}"]`);
    if (prev) prev.classList.remove('selected');
  }

  currentElement = el.sym;
  const cfg = catConfig[el.cat] || catConfig['nonmetal'];

  const cell = document.querySelector(`.element[data-symbol="${el.sym}"]`);

  const shellsStr = el.shells.map((n, i) => `${shellNames[i]}:${n}`).join(' ');

  const meltStr = el.melt > 0 ? `${el.melt.toFixed(1)} K (${(el.melt - 273.15).toFixed(1)}°C)` : '未知';
  const boilStr = el.boil > 0 ? `${el.boil.toFixed(1)} K (${(el.boil - 273.15).toFixed(1)}°C)` : '未知';
  const densStr = el.dens > 0 ? `${el.dens.toFixed(2)} g/cm³` : '未知';
  const yearStr = el.year > 0 ? `${el.year}年` : '古代';

  detailPanel.innerHTML = `
    <div class="panel-content">
    <div class="panel-header">
      <div class="panel-symbol-badge" style="background:${cfg.color}22; color:${cfg.color}; border-color:${cfg.color}44;">

      </div>

        <span class="cat-badge" style="background:${cfg.color}22; color:${cfg.color};">${cfg.label}</span>
      </div>
    </div>

    <div class="bohr-container">
      <div style="text-align:center;font-size:0.7rem;color:#8888aa;margin-bottom:6px;letter-spacing:0.04em;">

        <div class="label">原子质量</div>
        <div class="value">${el.mass.toFixed(2)} u</div>
      </div>
      <div class="info-item full-width">
        <div class="label">电子排布</div>
        <div class="value small">${el.ec}</div>
      </div>
      <div class="info-item full-width">
        <div class="label">各层电子数</div>
        <div class="value small">${shellsStr}</div>
      </div>
      <div class="info-item">
        <div class="label">熔点</div>
        <div class="value small">${meltStr}</div>
      </div>
      <div class="info-item">
        <div class="label">沸点</div>
        <div class="value small">${boilStr}</div>
      </div>
      <div class="info-item">
        <div class="label">密度</div>
        <div class="value small">${densStr}</div>
      </div>
      <div class="info-item">
        <div class="label">族 / 周期</div>
        <div class="value">${el.grp > 0 ? el.grp : '—'} / ${el.per}</div>
      </div>
      <div class="info-item full-width">
        <div class="label">发现年份</div>
        <div class="value small">${yearStr}</div>
      </div>
    </div>
    </div>
  `;

  // Start Bohr model animation
  setTimeout(() => startBohrAnimation(el), 50);
}

// ==================== BOHR MODEL ANIMATION ====================
function startBohrAnimation(el) {
  if (animationId) cancelAnimationFrame(animationId);

  const canvas = document.getElementById('bohrCanvas');
  if (!canvas) return;

  const container = canvas.parentElement;
  const size = container.clientWidth * (window.devicePixelRatio || 1);
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const cx = size / 2;
  const cy = size / 2;
  const maxRadius = size * 0.44;
  const shells = el.shells;
  const numShells = shells.length;
  const shellGap = maxRadius / Math.max(numShells, 1);

  const shellColors = ['#ff6b6b', '#ffa560', '#facc64', '#64c8b4', '#64b4ff', '#b482ff', '#f08cb4'];

  // Build static electron positions
  const electronData = shells.map((count, i) => {
    const electrons = [];
    for (let j = 0; j < count; j++) {
      const angle = (j / count) * Math.PI * 2 + (i * 0.3);
      electrons.push({ angle, radiusOffset: 0 });
    }
    return { count, radius: shellGap * (i + 0.7), electrons, color: shellColors[i % shellColors.length] };
  });

  // --- DRAW ONCE (no animation) ---
  ctx.clearRect(0, 0, size, size);

  // Background glow
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 1.05);
  bgGrad.addColorStop(0, 'rgba(108, 92, 231, 0.08)');
  bgGrad.addColorStop(0.5, 'rgba(108, 92, 231, 0.03)');
  bgGrad.addColorStop(1, 'rgba(10, 10, 30, 0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, size, size);

  // Draw shell rings
  electronData.forEach(shell => {
    ctx.beginPath();
    ctx.arc(cx, cy, shell.radius, 0, Math.PI * 2);
    ctx.strokeStyle = shell.color + '33';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Outer glow ring (subtle)
    ctx.beginPath();
    ctx.arc(cx, cy, shell.radius, 0, Math.PI * 2);
    ctx.strokeStyle = shell.color + '12';
    ctx.lineWidth = 4;
    ctx.stroke();
  });

  // Static glow particles around nucleus
  for (let i = 0; i < 25; i++) {
    const angle = (i / 25) * Math.PI * 2 + 0.4;
    const dist = shellGap * 0.35 * (0.6 + 0.4 * Math.sin(i * 1.7));
    const px = cx + Math.cos(angle) * dist;
    const py = cy + Math.sin(angle) * dist;
    const alpha = 0.15 + 0.2 * Math.sin(i * 2.3);
    ctx.beginPath();
    ctx.arc(px, py, 0.8 + Math.abs(Math.sin(i)) * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 180, 255, ${alpha})`;
    ctx.fill();
  }

  // Nucleus
  const nucleusRadius = Math.max(shellGap * 0.28, 6);
  const nucGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nucleusRadius);
  nucGrad.addColorStop(0, '#e8d5ff');
  nucGrad.addColorStop(0.3, '#b482ff');
  nucGrad.addColorStop(0.7, '#5c3db8');
  nucGrad.addColorStop(1, '#2a1050');
  ctx.beginPath();
  ctx.arc(cx, cy, nucleusRadius, 0, Math.PI * 2);
  ctx.fillStyle = nucGrad;
  ctx.fill();

  // Nucleus highlight
  const hlGrad = ctx.createRadialGradient(cx - nucleusRadius*0.3, cy - nucleusRadius*0.3, 0, cx, cy, nucleusRadius);
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, nucleusRadius, 0, Math.PI * 2);
  ctx.fillStyle = hlGrad;
  ctx.fill();

  // Atomic number in nucleus
  ctx.fillStyle = '#ffffffcc';
  ctx.font = `${Math.max(nucleusRadius * 0.9, 8)}px "Segoe UI", "PingFang SC", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(el.z, cx, cy);

  // Draw static electrons
  electronData.forEach(shell => {
    shell.electrons.forEach(e => {
      const r = shell.radius;
      const ex = cx + Math.cos(e.angle) * r;
      const ey = cy + Math.sin(e.angle) * r;

      // Electron glow
      const eGlow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 4.5);
      eGlow.addColorStop(0, shell.color);
      eGlow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(ex, ey, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = eGlow;
      ctx.fill();

      // Electron core (bright dot)
      ctx.beginPath();
      ctx.arc(ex, ey, 2.2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Tiny highlight
      ctx.beginPath();
      ctx.arc(ex - 0.5, ey - 0.7, 0.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();
    });
  });

  // Shell labels (K, L, M...)
  const shellNames = ['K', 'L', 'M', 'N', 'O', 'P', 'Q'];
  ctx.font = 'bold 9px "Segoe UI", "PingFang SC", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  electronData.forEach((shell, i) => {
    const lx = cx + shell.radius + 8;
    ctx.fillStyle = shell.color + '99';
    ctx.fillText(`${shellNames[i]}  ${shell.count}e⁻`, lx, cy);
  });
}

// ==================== INIT ====================
// Show Hydrogen by default
setTimeout(() => showDetail(elemMap['H']), 200);

// Re-render Bohr model on window resize
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (currentElement && elemMap[currentElement]) {
      startBohrAnimation(elemMap[currentElement]);
    }
  }, 250);
});
</script>
